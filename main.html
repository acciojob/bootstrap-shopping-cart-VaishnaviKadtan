<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bootstrap Shopping Cart</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>
.block-heading{
    text-align:center;
    color:#3b99e0;
    margin-bottom:40px;
}

.product{
    padding:20px 0;
    border-bottom:1px solid #ddd;
}

.summary{
    background-color:#f7fbff;
    padding:20px;
    border-top:3px solid #5ea4f3;
}

.summary button{
    background-color:#3b99e0;
    color:white;
    width:100%;
}

.summary h4{
    border-bottom:1px solid #ddd;
    padding-bottom:10px;
}
</style>

</head>
<body>

<div class="container mt-5">

    <div class="block-heading">
        <h2>Shopping Cart</h2>
    </div>

    <div class="row">

        <!-- Products Section -->
        <div class="col-lg-8">

            <!-- Product 1 -->
            <div class="product">
                <div class="row align-items-center">

                    <div class="col-md-3">
                        <img src="https://via.placeholder.com/150" class="img-fluid">
                    </div>

                    <div class="col-md-6">
                        <h5>Product One</h5>
                        <p>Sample description of the product.</p>
                    </div>

                    <div class="col-md-3">
                        <span>$120</span>
                    </div>

                </div>
            </div>

            <!-- Product 2 -->
            <div class="product">
                <div class="row align-items-center">

                    <div class="col-md-3">
                        <img src="https://via.placeholder.com/150" class="img-fluid">
                    </div>

                    <div class="col-md-6">
                        <h5>Product Two</h5>
                        <p>Sample description of the product.</p>
                    </div>

                    <div class="col-md-3">
                        <span>$90</span>
                    </div>

                </div>
            </div>

            <!-- Product 3 -->
            <div class="product">
                <div class="row align-items-center">

                    <div class="col-md-3">
                        <img src="https://via.placeholder.com/150" class="img-fluid">
                    </div>

                    <div class="col-md-6">
                        <h5>Product Three</h5>
                        <p>Sample description of the product.</p>
                    </div>

                    <div class="col-md-3">
                        <span>$60</span>
                    </div>

                </div>
            </div>

        </div>

        <!-- Summary Section -->
        <div class="col-lg-4">
            <div class="summary">

                <h4>Summary</h4>

                <div class="d-flex justify-content-between">
                    <span>Subtotal</span>
                    <span>$270</span>
                </div>

                <div class="d-flex justify-content-between">
                    <span>Shipping</span>
                    <span>$10</span>
                </div>

                <div class="d-flex justify-content-between mb-3">
                    <strong>Total</strong>
                    <strong>$280</strong>
                </div>

                <button class="btn">Checkout</button>

            </div>
        </div>

    </div>

</div>

</body>
</html>
